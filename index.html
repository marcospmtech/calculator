<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CalculadoraJS</title>

    <link rel="shortcut icon" href="assets/icon/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style/style.css">
</head>
<body>
    <header>
        <img src="assets/icon/logo.png" alt="CalculadoraJS">
        <h1>CalculadoraJS</h1>
    </header>

    <main>
        <div class="calculator">
            <div class="display">
                <p id="result">0</p>
            </div>

            <div class="calculator-buttons">
                <button class="numbers-btn">1</button>
                <button class="numbers-btn">2</button>
                <button class="numbers-btn">3</button>
                <button class="clear-btn">C</button>

                <button class="numbers-btn">4</button>
                <button class="numbers-btn">5</button>
                <button class="numbers-btn">6</button>
                <button class="operators-btn">÷</button>

                <button class="numbers-btn">7</button>
                <button class="numbers-btn">8</button>
                <button class="numbers-btn">9</button>
                <button class="operators-btn">X</button>

                <button class="operators-btn">+</button>
                <button class="numbers-btn">0</button>
                <button class="operators-btn">-</button>
                <button class="operators-btn">=</button>
            </div>
        </div>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
